name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Show project structure
        run: |
          echo "=== Project Root ==="
          ls -la
          echo ""
          echo "=== App Directory ==="
          ls -la app/ 2>/dev/null || echo "❌ No app directory"
          echo ""
          echo "=== Checking Gradle files ==="
          ls -la gradlew 2>/dev/null || echo "⚠️ No gradlew"
          ls -la gradle/wrapper/ 2>/dev/null || echo "⚠️ No gradle/wrapper"
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Create local.properties
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          cat local.properties
      
      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-8.2/bin" >> $GITHUB_PATH
          export PATH="/opt/gradle-8.2/bin:$PATH"
          gradle --version
      
      - name: Accept SDK licenses
        run: |
          export PATH="/opt/gradle-8.2/bin:$PATH"
          yes | sdkmanager --licenses || true
      
      - name: Build Debug APK
        run: |
          export PATH="/opt/gradle-8.2/bin:$PATH"
          gradle assembleDebug --stacktrace --info 2>&1 | tee build-log.txt
        continue-on-error: true
      
      - name: Check build outputs
        run: |
          echo "=== Looking for APK ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          echo ""
          echo "=== Build directory ==="
          ls -la app/build/ 2>/dev/null || echo "No build directory"
          ls -la app/build/outputs/ 2>/dev/null || echo "No outputs directory"
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "No apk directory"
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Clipboard-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
      
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt
          
