name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Show project structure
        run: |
          echo "=== Project Structure ==="
          find . -type f | head -50
          echo ""
          echo "=== Checking key files ==="
          ls -la settings.gradle 2>/dev/null || echo "❌ settings.gradle missing"
          ls -la build.gradle 2>/dev/null || echo "❌ build.gradle missing"
          ls -la app/build.gradle 2>/dev/null || echo "❌ app/build.gradle missing"
          ls -la gradlew 2>/dev/null || echo "⚠️ gradlew missing (will use system gradle)"
          echo ""
          echo "=== Java Version ==="
          java -version
          echo ""
          echo "=== Checking Kotlin files ==="
          ls app/src/main/java/com/smart/clipboard/*.kt 2>/dev/null || echo "❌ No Kotlin files found"
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt/
          export PATH="/opt/gradle-8.2/bin:$PATH"
          gradle --version
      
      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true
      
      - name: Build Debug APK
        run: |
          export PATH="/opt/gradle-8.2/bin:$PATH"
          gradle assembleDebug --stacktrace --info 2>&1 | tee build-log.txt
        continue-on-error: true
      
      - name: Show build log on failure
        if: failure()
        run: |
          echo "=== BUILD FAILED ==="
          cat build-log.txt | tail -100
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Clipboard-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
      
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt
          
