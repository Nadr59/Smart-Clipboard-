name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Create local.properties
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
      
      - name: Create gradle.properties
        run: |
          echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.nonTransitiveRClass=true" >> gradle.properties
          cat gradle.properties
      
      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-8.2/bin" >> $GITHUB_PATH
      
      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true
      
      - name: Build Debug APK
        run: |
          export PATH="/opt/gradle-8.2/bin:$PATH"
          gradle assembleDebug --stacktrace
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Clipboard-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          
